<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etsy Listing</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
        </div>
        <span>Etsy Listing</span>
      </div>
      <div class="header-actions">
        <button id="historyBtn" class="icon-btn" title="History">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span id="historyBadge" class="history-badge hidden">0</span>
        </button>
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Step 1: Upload -->
      <section id="uploadSection" class="section active">
        <div id="dropZone" class="drop-zone">
          <div class="drop-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </div>
          <p class="drop-text">Drag image here</p>
          <p class="drop-subtext">from web or computer</p>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
        <button id="browsePageBtn" class="btn btn-secondary btn-browse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 6h16M4 12h16m-7 6h7"/>
            <circle cx="8" cy="18" r="2"/>
          </svg>
          Browse Page Images
        </button>

        <!-- Page Images Picker -->
        <div id="pageImagesPicker" class="page-images-picker hidden">
          <div class="picker-header">
            <span>Page Images</span>
            <button id="closePickerBtn" class="picker-close">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div id="pageImagesGrid" class="page-images-grid">
            <!-- Images will be loaded here -->
          </div>
        </div>
        <div id="imagePreview" class="image-preview hidden">
          <img id="previewImg" src="" alt="Preview">
          <button id="removeImage" class="remove-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <button id="analyzeBtn" class="btn btn-primary hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
          Analyze
        </button>
      </section>

      <!-- Step 2: Loading -->
      <section id="loadingSection" class="section">
        <div class="loading-container">
          <div class="loading-spinner"></div>
          <p id="loadingText" class="loading-text">Analyzing image...</p>
          <div class="loading-steps">
            <div id="step1" class="loading-step">
              <span class="step-icon">1</span>
              <span>Image Analysis</span>
            </div>
            <div id="step2" class="loading-step">
              <span class="step-icon">2</span>
              <span>Content Generation</span>
            </div>
            <div id="step3" class="loading-step">
              <span class="step-icon">3</span>
              <span>Mockup Creation</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Step 3: Edit Content -->
      <section id="editSection" class="section">
        <div class="form-scroll">
          <!-- Mockups -->
          <div class="form-group">
            <label class="form-label">
              Mockups
              <button id="addMockupBtn" class="btn-small" title="Add mockup">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
              </button>
            </label>
            <div id="mockupsGrid" class="mockups-grid">
              <!-- Mockups will be inserted here -->
            </div>
            <div class="mockup-prompt-row">
              <input type="text" id="mockupPrompt" class="form-input mockup-prompt-input" placeholder="Optional: How do you want your mockup? (e.g., beach background, on wooden table)">
            </div>
          </div>

          <!-- Title -->
          <div class="form-group">
            <label class="form-label">
              Title <span id="titleCount" class="char-count">0/140</span>
              <button type="button" id="titleLangBtn" class="lang-badge" data-lang="en" title="Change language">
                🇬🇧
              </button>
              <button type="button" id="titleSyncBtn" class="sync-btn" title="Translate to other language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4v5h5M20 20v-5h-5M5 19a9 9 0 0115-6.7M19 5a9 9 0 01-15 6.7"/>
                </svg>
              </button>
            </label>
            <input type="text" id="titleInput" class="form-input" placeholder="Product title" maxlength="140">
          </div>

          <!-- Description -->
          <div class="form-group">
            <label class="form-label">
              Description
              <button type="button" id="descLangBtn" class="lang-badge" data-lang="en" title="Change language">
                🇬🇧
              </button>
              <button type="button" id="descSyncBtn" class="sync-btn" title="Translate to other language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4v5h5M20 20v-5h-5M5 19a9 9 0 0115-6.7M19 5a9 9 0 01-15 6.7"/>
                </svg>
              </button>
            </label>
            <textarea id="descInput" class="form-textarea" placeholder="Product description" rows="10"></textarea>
          </div>

          <!-- Price -->
          <div class="form-row">
            <div class="form-group flex-1">
              <label class="form-label">Price (TL)</label>
              <input type="number" id="priceInput" class="form-input" placeholder="2500">
            </div>
            <div class="form-group flex-1">
              <label class="form-label">USD</label>
              <input type="text" id="usdPrice" class="form-input" readonly>
            </div>
          </div>

          <!-- Tags -->
          <div class="form-group">
            <label class="form-label">Tags <span id="tagCount" class="char-count">0/13</span></label>
            <textarea id="tagsInput" class="form-textarea small" placeholder="tag1, tag2, tag3" rows="3"></textarea>
          </div>

          <!-- Materials -->
          <div class="form-group">
            <label class="form-label">Materials</label>
            <input type="text" id="materialsInput" class="form-input" placeholder="beads, crystals, charms">
          </div>
        </div>

        <!-- Actions -->
        <div class="actions">
          <button id="backBtn" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Back
          </button>
          <button id="fillFormBtn" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 13l4 4L19 7"/>
            </svg>
            Fill Form
          </button>
        </div>
      </section>

      <!-- History Section -->
      <section id="historySection" class="section">
        <div class="section-header">
          <h2 class="section-title">History</h2>
          <button id="newListingBtn" class="btn btn-primary btn-sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            New
          </button>
        </div>
        <div id="historyList" class="history-list">
          <!-- History items will be inserted here -->
        </div>
      </section>

      <!-- Settings Modal -->
      <section id="settingsSection" class="section">
        <h2 class="section-title">Settings</h2>
        <div class="form-scroll">
          <div class="form-group">
            <label class="form-label">OpenAI API Key</label>
            <input type="password" id="openaiKey" class="form-input" placeholder="sk-...">
          </div>
          <div class="form-group">
            <label class="form-label">Gemini API Key</label>
            <input type="password" id="geminiKey" class="form-input" placeholder="AI...">
          </div>
          <div class="form-group">
            <label class="form-label">TL/USD Kuru</label>
            <input type="number" id="exchangeRate" class="form-input" placeholder="38" step="0.1">
          </div>

          <div class="settings-divider"></div>
          <h3 class="settings-subtitle">AI Models</h3>

          <div class="form-group">
            <label class="form-label">Image Analysis (OpenAI Vision)</label>
            <select id="visionModel" class="form-input">
              <option value="gpt-4o-mini">⭐ GPT-4o Mini - $0.15/$0.60 (Recommended)</option>
              <option value="gpt-5-nano">GPT-5 Nano - $0.05/$0.40 (Cheapest)</option>
              <option value="gpt-4.1-nano">GPT-4.1 Nano - $0.10/$0.40</option>
              <option value="gpt-5-mini">GPT-5 Mini - $0.25/$2</option>
              <option value="gpt-4.1-mini">GPT-4.1 Mini - $0.40/$1.60</option>
              <option value="o3-mini">O3 Mini - $0.55/$2.20</option>
              <option value="o4-mini">O4 Mini - $1.10/$4.40</option>
              <option value="gpt-5.2">GPT-5.2 - $1.25/$10</option>
              <option value="gpt-4.1">GPT-4.1 - $2/$8</option>
              <option value="o3">O3 - $2/$8</option>
              <option value="gpt-4o">GPT-4o - $2.50/$10</option>
              <option value="gpt-5.2-thinking">GPT-5.2 Thinking - $1.25/$14</option>
              <option value="gpt-5.2-pro">GPT-5.2 Pro - Premium</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Content Generation (OpenAI Chat)</label>
            <select id="contentModel" class="form-input">
              <option value="gpt-4o-mini">⭐ GPT-4o Mini - $0.15/$0.60 (Recommended)</option>
              <option value="gpt-5-nano">GPT-5 Nano - $0.05/$0.40 (Cheapest)</option>
              <option value="gpt-4.1-nano">GPT-4.1 Nano - $0.10/$0.40</option>
              <option value="gpt-5-mini">GPT-5 Mini - $0.25/$2</option>
              <option value="gpt-4.1-mini">GPT-4.1 Mini - $0.40/$1.60</option>
              <option value="o3-mini">O3 Mini - $0.55/$2.20</option>
              <option value="o4-mini">O4 Mini - $1.10/$4.40</option>
              <option value="gpt-5.2">GPT-5.2 - $1.25/$10</option>
              <option value="gpt-4.1">GPT-4.1 - $2/$8</option>
              <option value="o3">O3 - $2/$8</option>
              <option value="gpt-4o">GPT-4o - $2.50/$10</option>
              <option value="gpt-5.2-codex">GPT-5.2 Codex - Code Focused</option>
              <option value="gpt-5.2-thinking">GPT-5.2 Thinking - $1.25/$14</option>
              <option value="gpt-5.2-pro">GPT-5.2 Pro - Premium</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Mockup Generation (Gemini Image)</label>
            <select id="mockupModel" class="form-input">
              <option value="gemini-2.5-flash-image">⭐ Nano Banana - $0.039/img (Recommended)</option>
              <option value="imagen-3.0-generate-002">Imagen 3 - $0.03/img</option>
              <option value="imagen-4">Imagen 4 - $0.04/img</option>
              <option value="imagen-4-ultra">Imagen 4 Ultra - $0.06/img</option>
              <option value="gemini-2.0-flash">Gemini 2.0 Flash - $0.10/$0.40 (FREE)</option>
              <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash-Lite - $0.10/$0.40 (FREE)</option>
              <option value="gemini-3-pro-image">Nano Banana Pro - $0.13-0.24/img (4K)</option>
              <option value="gemini-2.5-flash">Gemini 2.5 Flash - $0.30/$2.50 (FREE)</option>
              <option value="gemini-3-flash">Gemini 3 Flash - $0.50/$3 (FREE)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Video Generation (Google Veo)</label>
            <select id="videoModel" class="form-input">
              <option value="veo-2.0-generate-001">⭐ Veo 2.0 - $0.35/sec (Recommended)</option>
              <option value="veo-3.0-generate-preview">Veo 3.0 Preview - $0.40/sec</option>
              <option value="veo-3.1-generate-preview">Veo 3.1 Preview - $0.50/sec (Best)</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button id="cancelSettingsBtn" class="btn btn-secondary">Cancel</button>
          <button id="saveSettingsBtn" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 13l4 4L19 7"/>
            </svg>
            Save
          </button>
        </div>
      </section>
    </main>

    <!-- Status Bar -->
    <footer class="footer">
      <div id="statusIndicator" class="status-indicator">
        <span class="status-dot"></span>
        <span id="statusText">Ready</span>
      </div>
    </footer>
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox hidden">
    <button id="closeLightbox" class="lightbox-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <img id="lightboxImg" src="" alt="Mockup">
  </div>

  <script src="popup.js"></script>
</body>
</html>
